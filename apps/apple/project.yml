name: Ghostwritr
options:
  bundleIdPrefix: com.ghostwritr
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  Ghostwritr-iOS:
    type: application
    platform: iOS
    sources:
      - path: Ghostwritr
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ghostwritr.studio
        PRODUCT_NAME: Ghostwritr
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    info:
      path: Config/iOS-Info.plist
      properties:
        CFBundleDisplayName: Ghostwritr
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
  Ghostwritr-macOS:
    type: application
    platform: macOS
    sources:
      - path: Ghostwritr
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ghostwritr.studio.mac
        PRODUCT_NAME: Ghostwritr
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: true
    info:
      path: Config/macOS-Info.plist
      properties:
        CFBundleDisplayName: Ghostwritr
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
schemes:
  Ghostwritr-iOS:
    build:
      targets:
        Ghostwritr-iOS: all
    run:
      config: Debug
  Ghostwritr-macOS:
    build:
      targets:
        Ghostwritr-macOS: all
    run:
      config: Debug
